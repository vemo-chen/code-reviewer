spring:
  application:
    name: code-reviewer
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/code_reviewer?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:code_reviewer}
    password: ${DB_PASSWORD:change_me}
server:
  port: 8765

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

code-reviewer:
  app:
    platform-url: http://10.12.8.132:5173/reviews
    async:
      core-pool-size: 8
      max-pool-size: 16
      queue-capacity: 200
      thread-name-prefix: review-worker-
    review-worker:
      enabled: true
      worker-count: 8
      idle-sleep-ms: 5000
      error-sleep-ms: 10000
    review-context:
      max-request-body-bytes: 4194304
  gitlab:
    connect-timeout-ms: 5000
    read-timeout-ms: 15000
  sso:
    base-url: ${SSO_BASE_URL:}
    login-path: ${SSO_LOGIN_PATH:}
    employee-info-path: ${SSO_EMPLOYEE_INFO_PATH:}
    connect-timeout-ms: ${SSO_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${SSO_READ_TIMEOUT_MS:15000}
  review:
    rules-file: config/review-rules.md
    rule-refresh-ms: 30000
